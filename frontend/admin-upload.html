<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }
    button {
      margin-top: 10px;
      padding: 6px 14px;
    }
    .bloco {
      margin-bottom: 40px;
    }
  </style>
</head>

<body>

<h1>🛠️ Painel Admin</h1>

<!-- ========================= -->
<!-- IMPORTAÇÃO DE USUÁRIOS -->
<!-- ========================= -->
<div class="bloco">
  <h2>Importação de Usuários</h2>

  <input type="file" id="usersFile" />
  <br>
  <button onclick="enviarUsuarios()">Enviar usuários</button>

  <p id="usersMsg"></p>
</div>

<hr>

<!-- ========================= -->
<!-- IMPORTAÇÃO DE RANKING -->
<!-- ========================= -->
<div class="bloco">
  <h2>🏆 Importação de Ranking</h2>

  <input
    type="file"
    id="rankingFile"
    accept=".xlsx,.xls"
  />
  <br>
  <button onclick="enviarRanking()">Enviar pontuação para ranking</button>

  <p id="rankingMsg"></p>
</div>

<script>
  const BACKEND = "https://SEU-BACKEND.onrender.com";

  function enviarRanking() {
    const file = document.getElementById("rankingFile").files[0];
    const msg = document.getElementById("rankingMsg");

    if (!file) {
      msg.innerText = "❌ Selecione a planilha";
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    msg.innerText = "⏳ Processando ranking...";

    fetch(BACKEND + "/import-ranking", {
      method: "POST",
      body: formData
    })
    .then(r => r.json())
    .then(d => {
      if (d.ranking_gerado !== undefined) {
        msg.innerText =
          "✅ Ranking atualizado (" + d.ranking_gerado + " registros)";
      } else {
        msg.innerText = "❌ Erro ao gerar ranking";
      }
    })
    .catch(() => {
      msg.innerText = "❌ Erro de conexão";
    });
  }
</script>

</body>
</html>
