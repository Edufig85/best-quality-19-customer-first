<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ranking BQ19</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 20px;
}
.categoria {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
.podio {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 140px;
  text-align: center;
}
.ouro { border: 3px solid gold; }
.prata { border: 3px solid silver; }
.bronze { border: 3px solid #cd7f32; }
</style>
</head>

<body>

<h1>🏆 Ranking por Categoria</h1>

<div id="categorias"></div>
<div id="ranking"></div>

<script>
const API = "https://SEU-BACKEND.onrender.com";

fetch(API + "/categorias")
  .then(res => res.json())
  .then(categorias => {
    const div = document.getElementById("categorias");
    categorias.forEach(c => {
      const d = document.createElement("div");
      d.className = "categoria";
      d.innerText = c;
      d.onclick = () => carregar(c);
      div.appendChild(d);
    });
  });

function carregar(cat) {
  fetch(API + "/ranking/" + encodeURIComponent(cat))
    .then(res => res.json())
    .then(lista => {
      const r = document.getElementById("ranking");
      r.innerHTML = "<h2>" + cat + "</h2>";

      const p = document.createElement("div");
      p.className = "podio";

      lista.forEach((x, i) => {
        const c = document.createElement("div");
        c.className = "card";
        if (i === 0) c.classList.add("ouro");
        if (i === 1) c.classList.add("prata");
        if (i === 2) c.classList.add("bronze");

        c.innerHTML = `<strong>${i+1}º</strong><br>${x.nome}<br>${x.pontos} pts`;
        p.appendChild(c);
      });

      r.appendChild(p);
    });
}
</script>

</body>
</html>
